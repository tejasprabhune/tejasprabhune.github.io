<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tejas Prabhune</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@200..900&family=Noto+Serif+Display:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background: #2C3639;
      color: #DCD7C9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
    }

    h1 {
      font-family: "Noto Serif Display", serif;
      font-weight: 800;
      font-style: italic;
      font-optical-sizing: auto;
      font-variation-settings: "wdth" 100;
      font-size: clamp(42px, 8vw, 80px);
      color: #DCD7C9;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 48px;
    }

    nav {
      display: flex;
      gap: 32px;
      align-items: center;
    }

    nav a {
      font-family: "Inconsolata", monospace;
      font-weight: 400;
      font-size: 15px;
      color: #A27B5C;
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.15s;
    }

    nav a:hover {
      color: #DCD7C9;
    }

    .sep {
      font-family: "Inconsolata", monospace;
      font-size: 13px;
      color: #3F4E4F;
      user-select: none;
    }

    @media (max-width: 400px) {
      nav {
        flex-direction: column;
        gap: 16px;
      }
      .sep {
        display: none;
      }
    }
  </style>
</head>
<body>

  <h1>tejas prabhune</h1>

  <nav>
    <a href="/research">research</a>
    <span class="sep">/</span>
    <a href="https://tejasprabhune.github.io/kiln">kiln</a>
    <span class="sep">/</span>
    <a href="https://tejasprabhune.github.io/bv-registry">bv-registry</a>
  </nav>

</body>
</html>
